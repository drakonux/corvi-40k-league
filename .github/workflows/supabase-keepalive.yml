name: Supabase keep-alive

# Evita que Supabase pause el proyecto por inactividad (plan Free se pausa
# tras 7 dias sin trafico). Hace un ping de solo lectura a la API REST.
# La VITE_SUPABASE_ANON_KEY es la clave publica anon: ya viaja en el bundle
# del frontend a cada visitante, asi que no expone nada que no fuera publico.

on:
  schedule:
    - cron: '0 6 * * *'     # cada dia a las 06:00 UTC (antes cada 3 dias: no
                            # bastaba para evitar la pausa por inactividad)
  workflow_dispatch:         # permite lanzarlo a mano desde la pestana Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92dXJ1c3JvcnV6eHlsZmtwemFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjYzODYsImV4cCI6MjA5MDMwMjM4Nn0.cARaL39MFv-nHGsVuYsokdSDN57veBAttzZAtE-ua9o"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://ovurusroruzxylfkpzam.supabase.co/rest/v1/resultados?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          echo "HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::error::Supabase devolvio un estado inesperado: $STATUS"
            exit 1
          fi
          echo "Ping correcto, proyecto activo."
